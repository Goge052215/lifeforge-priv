app = "lifeforge-priv-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/hello"
    protocol = "http"
    timeout = "5s"

[[mounts]]
  source = "medium_data"
  destination = "/lifeforge/server/medium"
