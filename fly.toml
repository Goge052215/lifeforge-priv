# fly.toml app configuration file generated for lifeforge-priv on 2026-06-09T01:14:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lifeforge-priv'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'medium_data'
  destination = '/lifeforge/server/medium'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/hello'
    protocol = 'http'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
